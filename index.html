<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice to Text - Free STT</title>
    <meta name="description" content="Free voice to text converter. Speak and convert to text in multiple languages.">
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1955893232253258" crossorigin="anonymous"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 20px; overflow: hidden; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; text-align: center; }
        .header h1 { font-size: 2rem; margin-bottom: 10px; }
        
        .content { padding: 30px; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 10px; font-weight: 600; color: #333; font-size: 1.1rem; }
        select { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 10px; font-size: 1rem; }
        
        .btn { display: block; width: 100%; padding: 20px; background: #667eea; color: white; border: none; border-radius: 10px; font-size: 1.2rem; font-weight: 600; cursor: pointer; margin: 10px 0; }
        .btn.recording { background: #dc3545; animation: pulse 1s infinite; }
        .btn-copy { background: #28a745; }
        
        .result { width: 100%; min-height: 150px; padding: 15px; border: 2px solid #667eea; border-radius: 10px; font-size: 1rem; resize: vertical; }
        
        .ads { margin: 20px 0; text-align: center; }
        
        .status { padding: 15px; background: #f5f5f5; border-radius: 10px; text-align: center; color: #666; margin: 15px 0; }
        
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎙️ Voice to Text</h1>
            <p>Free Speech to Text Converter</p>
        </div>
        
        <div class="content">
            <div class="form-group">
                <label>Select Language</label>
                <select id="lang">
                    <option value="ko-KR">Korean</option>
                    <option value="en-US">English</option>
                    <option value="ja-JP">Japanese</option>
                    <option value="zh-CN">Chinese</option>
                    <option value="es-ES">Spanish</option>
                    <option value="fr-FR">French</option>
                    <option value="de-DE">German</option>
                </select>
            </div>
            
            <button class="btn" id="recordBtn" onclick="toggleRecording()">
                🎤 Click to Speak
            </button>
            
            <div class="form-group">
                <label>Result</label>
                <textarea class="result" id="result" placeholder="Your speech will appear here..."></textarea>
            </div>
            
            <button class="btn btn-copy" onclick="copyText()">📋 Copy Text</button>
            
            <div class="status" id="status">Click the button and start speaking</div>
            
            <div class="ads">
                <ins class="adsbygoogle"
                     style="display:block"
                     data-ad-client="ca-pub-1955893232253258"
                     data-ad-slot="1234567890"
                     data-ad-format="auto"
                     data-full-width-responsive="true"></ins>
            </div>
        </div>
    </div>

    <script>
        let recognition = null;
        let isRecording = false;
        
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (!SpeechRecognition) {
            document.getElementById('status').textContent = 'This browser does not support voice recognition';
        }
        
        function toggleRecording() {
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        }
        
        function startRecording() {
            if (!SpeechRecognition) return;
            
            recognition = new SpeechRecognition();
            recognition.lang = document.getElementById('lang').value;
            recognition.continuous = true;
            recognition.interimResults = true;
            
            recognition.onstart = () => {
                isRecording = true;
                document.getElementById('recordBtn').textContent = '⏹ Stop';
                document.getElementById('recordBtn').classList.add('recording');
                document.getElementById('status').textContent = 'Listening... Speak now!';
            };
            
            recognition.onresult = (event) => {
                let result = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    result += event.results[i][0].transcript;
                }
                document.getElementById('result').value = result;
            };
            
            recognition.onerror = (event) => {
                document.getElementById('status').textContent = 'Error: ' + event.error;
            };
            
            recognition.onend = () => {
                isRecording = false;
                document.getElementById('recordBtn').textContent = '🎤 Click to Speak';
                document.getElementById('recordBtn').classList.remove('recording');
                document.getElementById('status').textContent = 'Stopped';
            };
            
            recognition.start();
        }
        
        function stopRecording() {
            if (recognition) recognition.stop();
        }
        
        function copyText() {
            const text = document.getElementById('result').value;
            if (text) {
                navigator.clipboard.writeText(text);
                document.getElementById('status').textContent = 'Copied!';
            }
        }
        
        (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
</body>
</html>
