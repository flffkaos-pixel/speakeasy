<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeakEasy - Free TTS & STT</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; text-align: center; }
        .header h1 { font-size: 2rem; margin-bottom: 10px; }
        .header p { opacity: 0.9; }
        
        .tabs { display: flex; border-bottom: 1px solid #eee; }
        .tab { flex: 1; padding: 20px; text-align: center; cursor: pointer; font-weight: 600; color: #666; transition: all 0.3s; }
        .tab.active { color: #667eea; border-bottom: 3px solid #667eea; }
        
        .content { padding: 30px; }
        .section { display: none; }
        .section.active { display: block; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        select, textarea, input { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 10px; font-size: 1rem; transition: border-color 0.3s; }
        select:focus, textarea:focus, input:focus { outline: none; border-color: #667eea; }
        textarea { min-height: 150px; resize: vertical; }
        
        .btn { display: inline-block; padding: 15px 40px; background: #667eea; color: white; border: none; border-radius: 50px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; margin: 5px; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(102,126,234,0.4); }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        .btn-secondary { background: #764ba2; }
        .btn-success { background: #28a745; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 5px; }
        
        .emotion-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 10px; }
        .emotion-btn { padding: 15px 10px; border: 2px solid #eee; border-radius: 10px; background: white; cursor: pointer; transition: all 0.3s; text-align: center; }
        .emotion-btn:hover { border-color: #667eea; }
        .emotion-btn.active { border-color: #667eea; background: #f0f4ff; }
        .emotion-btn span { font-size: 1.5rem; display: block; }
        .emotion-btn small { font-size: 0.8rem; color: #666; }
        
        .status { padding: 15px; background: #f5f5f5; border-radius: 10px; margin-top: 20px; text-align: center; color: #666; }
        .status.recording { background: #fee; color: #c00; animation: pulse 1s infinite; }
        .status.success { background: #efe; color: #060; }
        
        .file-upload { border: 2px dashed #667eea; padding: 30px; text-align: center; border-radius: 10px; cursor: pointer; }
        .file-upload:hover { background: #f5f5ff; }
        
        .detected { font-size: 0.9rem; color: #667eea; margin-top: 5px; }
        
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎙️ SpeakEasy</h1>
            <p>Free TTS & STT - Multiple Languages</p>
        </div>
        
        <div class="tabs">
            <div class="tab active" data-tab="tts">TTS (Text to Speech)</div>
            <div class="tab" data-tab="stt">STT (Speech to Text)</div>
        </div>
        
        <div class="content">
            <!-- TTS Section -->
            <div class="section active" id="tts-section">
                <div class="form-group">
                    <label>Language (Auto-detected from text)</label>
                    <select id="tts-lang">
                        <option value="auto">🔍 Auto Detect</option>
                        <option value="ko-KR">Korean (한국어)</option>
                        <option value="en-US">English</option>
                        <option value="ja-JP">Japanese (日本語)</option>
                        <option value="zh-CN">Chinese (中文)</option>
                        <option value="es-ES">Spanish (Español)</option>
                        <option value="vi-VN">Vietnamese (Tiếng Việt)</option>
                        <option value="th-TH">Thai (ไทย)</option>
                        <option value="fr-FR">French (Français)</option>
                        <option value="de-DE">German (Deutsch)</option>
                        <option value="ru-RU">Russian (Русский)</option>
                        <option value="ar-SA">Arabic (العربية)</option>
                        <option value="pt-BR">Portuguese (Português)</option>
                        <option value="it-IT">Italian (Italiano)</option>
                    </select>
                    <div class="detected" id="detected-lang"></div>
                </div>
                
                <div class="form-group">
                    <label>Emotion</label>
                    <div class="emotion-grid">
                        <button class="emotion-btn active" data-emotion="neutral">
                            <span>😐</span>
                            <small>Neutral</small>
                        </button>
                        <button class="emotion-btn" data-emotion="happy">
                            <span>😊</span>
                            <small>Happy</small>
                        </button>
                        <button class="emotion-btn" data-emotion="sad">
                            <span>😢</span>
                            <small>Sad</small>
                        </button>
                        <button class="emotion-btn" data-emotion="angry">
                            <span>😠</span>
                            <small>Angry</small>
                        </button>
                        <button class="emotion-btn" data-emotion="excited">
                            <span>🤩</span>
                            <small>Excited</small>
                        </button>
                        <button class="emotion-btn" data-emotion="calm">
                            <span>😌</span>
                            <small>Calm</small>
                        </button>
                        <button class="emotion-btn" data-emotion="scared">
                            <span>😨</span>
                            <small>Scared</small>
                        </button>
                        <button class="emotion-btn" data-emotion="whisper">
                            <span>🤫</span>
                            <small>Whisper</small>
                        </button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Voice Speed</label>
                    <input type="range" id="tts-speed" min="0.5" max="2" step="0.1" value="1" style="width:100%">
                    <div style="text-align: center; margin-top: 5px;"><span id="speed-val">1.0</span>x</div>
                </div>
                
                <div class="form-group">
                    <label>Pitch</label>
                    <input type="range" id="tts-pitch" min="0.5" max="2" step="0.1" value="1" style="width:100%">
                    <div style="text-align: center; margin-top: 5px;"><span id="pitch-val">1.0</span></div>
                </div>
                
                <div class="form-group">
                    <label>Enter Text (Any Language)</label>
                    <textarea id="tts-text" placeholder="Type in any language - we'll detect it automatically!"></textarea>
                </div>
                
                <button id="tts-speak" class="btn">🔊 Speak</button>
                <button id="tts-stop" class="btn btn-secondary">⏹ Stop</button>
                
                <div class="status" id="tts-status">Ready - Type text and click Speak</div>
                
                <div class="form-group" style="margin-top: 20px;">
                    <label>Download Audio</label>
                    <div class="btn-group">
                        <button id="dl-mp3" class="btn btn-success" disabled>📥 MP3</button>
                        <button id="dl-wav" class="btn btn-success" disabled>📥 WAV</button>
                        <button id="dl-ogg" class="btn btn-success" disabled>📥 OGG</button>
                    </div>
                </div>
            </div>
            
            <!-- STT Section -->
            <div class="section" id="stt-section">
                <div class="form-group">
                    <label>Upload Audio/Video File</label>
                    <div class="file-upload" onclick="document.getElementById('audio-file').click()">
                        <p>📁 Click to upload or drag & drop</p>
                        <p style="font-size: 0.8rem; color: #999; margin-top: 10px;">Supported: MP3, WAV, M4A, WEBM, MP4, OGG</p>
                        <input type="file" id="audio-file" accept="audio/*,video/*" style="display: none" multiple>
                    </div>
                    <div id="file-list" style="margin-top: 10px;"></div>
                </div>
                
                <div class="form-group">
                    <label>Or Record Voice</label>
                    <button id="stt-start" class="btn">🎤 Start Recording</button>
                    <button id="stt-stop" class="btn btn-secondary" disabled>⏹ Stop</button>
                </div>
                
                <div class="form-group" style="margin-top: 20px;">
                    <label>Result</label>
                    <textarea id="stt-result" placeholder="Text will appear here..."></textarea>
                </div>
                
                <div class="form-group">
                    <label>Export as</label>
                    <div class="btn-group">
                        <button id="export-txt" class="btn btn-success">📄 TXT</button>
                        <button id="export-doc" class="btn btn-success">📝 DOC</button>
                        <button id="export-json" class="btn btn-success">📋 JSON</button>
                        <button id="export-srt" class="btn btn-success">🎬 SRT</button>
                    </div>
                </div>
                
                <button id="stt-copy" class="btn">📋 Copy to Clipboard</button>
                
                <div class="status recording" id="stt-status">Upload a file or click Start to record</div>
            </div>
        </div>
    </div>

    <script>
        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab + '-section').classList.add('active');
            });
        });

        // Emotion selection
        let currentEmotion = 'neutral';
        document.querySelectorAll('.emotion-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.emotion-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentEmotion = btn.dataset.emotion;
            });
        });

        // Emotion settings
        const emotionSettings = {
            neutral: { rate: 1, pitch: 1, volume: 1 },
            happy: { rate: 1.1, pitch: 1.1, volume: 1 },
            sad: { rate: 0.9, pitch: 0.9, volume: 0.8 },
            angry: { rate: 1.1, pitch: 1.2, volume: 1 },
            excited: { rate: 1.3, pitch: 1.2, volume: 1 },
            calm: { rate: 0.9, pitch: 1, volume: 0.9 },
            scared: { rate: 1.2, pitch: 1.3, volume: 0.9 },
            whisper: { rate: 0.8, pitch: 0.8, volume: 0.5 }
        };

        // Language detection
        const langPatterns = {
            'ko-KR': /[가-힣]/,
            'ja-JP': /[ひらがなカタカナ]/,
            'zh-CN': /[中文]/,
            'ar-SA': /[العربية]/,
            'ru-RU': /[А-Яа-я]/,
            'th-TH': /[ก-๙]/,
            'vi-VN': /[àáảãạăằắẳẵặâầấẩẫậèéẻẽẹêềếểễệìíỉĩịòóỏõọôồốổỗộùúủũụưừứửữựỳýỷỹỵđ]/,
            'es-ES': /[áéíóúñü¿¡]/,
            'fr-FR': /[àâçéèêëîïôùûüÿ]/,
            'de-DE': /[äöüß]/,
            'pt-BR': /[ãõç]/,
            'it-IT': /[àèéìíòóù]/,
            'en-US': /[a-zA-Z]/
        };

        function detectLanguage(text) {
            for (const [lang, pattern] of Object.entries(langPatterns)) {
                if (pattern.test(text)) return lang;
            }
            return 'en-US';
        }

        // TTS
        const synth = window.speechSynthesis;
        let audioChunks = [];
        let mediaRecorder = null;
        let audioBlob = null;

        document.getElementById('tts-text').addEventListener('input', (e) => {
            const text = e.target.value;
            const autoLang = document.getElementById('tts-lang').value;
            if (autoLang === 'auto' && text.length > 0) {
                const detected = detectLanguage(text);
                document.getElementById('detected-lang').textContent = `Detected: ${detected}`;
            }
        });

        document.getElementById('tts-speed').addEventListener('input', (e) => {
            document.getElementById('speed-val').textContent = e.target.value;
        });

        document.getElementById('tts-pitch').addEventListener('input', (e) => {
            document.getElementById('pitch-val').textContent = e.target.value;
        });

        async function setupAudioRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                
                mediaRecorder.ondataavailable = (e) => {
                    audioChunks.push(e.data);
                };
                
                mediaRecorder.onstop = () => {
                    audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    document.getElementById('dl-mp3').disabled = false;
                    document.getElementById('dl-wav').disabled = false;
                    document.getElementById('dl-ogg').disabled = false;
                };
            } catch (err) {
                console.log('Audio recording not available');
            }
        }

        document.getElementById('tts-speak').addEventListener('click', async () => {
            const text = document.getElementById('tts-text').value;
            if (!text) {
                document.getElementById('tts-status').textContent = 'Please enter text first';
                return;
            }
            
            if (synth.speaking) synth.cancel();
            
            await setupAudioRecording();
            if (mediaRecorder && mediaRecorder.state === 'inactive') {
                mediaRecorder.start();
            }
            
            const utterance = new SpeechSynthesisUtterance(text);
            let lang = document.getElementById('tts-lang').value;
            
            if (lang === 'auto') {
                lang = detectLanguage(text);
            }
            
            utterance.lang = lang;
            
            // Apply emotion settings + user preferences
            const emotion = emotionSettings[currentEmotion];
            const userRate = parseFloat(document.getElementById('tts-speed').value);
            const userPitch = parseFloat(document.getElementById('tts-pitch').value);
            
            utterance.rate = emotion.rate * userRate;
            utterance.pitch = emotion.pitch * userPitch;
            utterance.volume = emotion.volume;
            
            utterance.onstart = () => {
                document.getElementById('tts-status').textContent = `🔊 Speaking with ${currentEmotion} emotion...`;
            };
            
            utterance.onend = () => {
                if (mediaRecorder && mediaRecorder.state === 'recording') {
                    mediaRecorder.stop();
                }
                document.getElementById('tts-status').textContent = '✅ Done! Audio ready to download';
                setTimeout(() => document.getElementById('tts-status').textContent = 'Ready', 3000);
            };
            
            synth.speak(utterance);
        });

        document.getElementById('tts-stop').addEventListener('click', () => {
            synth.cancel();
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
            }
            document.getElementById('tts-status').textContent = '⏹ Stopped';
        });

        function downloadBlob(blob, filename, mimeType) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
            document.getElementById('tts-status').textContent = `✅ Downloaded ${filename}`;
        }

        document.getElementById('dl-mp3').addEventListener('click', () => {
            if (audioBlob) downloadBlob(audioBlob, 'speech.mp3', 'audio/mp3');
        });
        
        document.getElementById('dl-wav').addEventListener('click', () => {
            if (audioBlob) downloadBlob(audioBlob, 'speech.wav', 'audio/wav');
        });
        
        document.getElementById('dl-ogg').addEventListener('click', () => {
            if (audioBlob) downloadBlob(audioBlob, 'speech.ogg', 'audio/ogg');
        });

        // STT - File upload
        document.getElementById('audio-file').addEventListener('change', async (e) => {
            const files = e.target.files;
            if (!files.length) return;
            
            document.getElementById('file-list').innerHTML = `<p>📄 ${files[0].name}</p>`;
            document.getElementById('stt-status').textContent = '🔄 Processing...';
            
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.continuous = true;
            recognition.interimResults = true;
            
            recognition.onresult = (event) => {
                let result = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    result += event.results[i][0].transcript;
                }
                document.getElementById('stt-result').value = result;
            };
            
            recognition.onend = () => {
                document.getElementById('stt-status').textContent = '✅ Transcription complete';
            };
            
            recognition.start();
        });

        // STT - Microphone
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            
            recognition.onstart = () => {
                document.getElementById('stt-status').textContent = '🎤 Recording...';
                document.getElementById('stt-status').classList.add('recording');
                document.getElementById('stt-start').disabled = true;
                document.getElementById('stt-stop').disabled = false;
            };
            
            recognition.onresult = (event) => {
                let result = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    result += event.results[i][0].transcript;
                }
                document.getElementById('stt-result').value = result;
            };
            
            recognition.onend = () => {
                document.getElementById('stt-status').textContent = '✅ Recording stopped';
                document.getElementById('stt-status').classList.remove('recording');
                document.getElementById('stt-start').disabled = false;
                document.getElementById('stt-stop').disabled = true;
            };
        }

        document.getElementById('stt-start').addEventListener('click', () => {
            if (recognition) recognition.start();
        });

        document.getElementById('stt-stop').addEventListener('click', () => {
            if (recognition) recognition.stop();
        });

        // Export functions
        function getText() {
            return document.getElementById('stt-result').value;
        }

        document.getElementById('export-txt').addEventListener('click', () => {
            const text = getText();
            if (!text) return;
            const blob = new Blob([text], { type: 'text/plain' });
            downloadBlob(blob, 'transcript.txt', 'text/plain');
        });

        document.getElementById('export-doc').addEventListener('click', () => {
            const text = getText();
            if (!text) return;
            const html = `<!DOCTYPE html><html><head><meta charset="utf-8"></head><body><pre>${text}</pre></body></html>`;
            const blob = new Blob([html], { type: 'application/msword' });
            downloadBlob(blob, 'transcript.doc', 'application/msword');
        });

        document.getElementById('export-json').addEventListener('click', () => {
            const text = getText();
            if (!text) return;
            const data = { text: text, timestamp: new Date().toISOString(), language: 'auto' };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            downloadBlob(blob, 'transcript.json', 'application/json');
        });

        document.getElementById('export-srt').addEventListener('click', () => {
            const text = getText();
            if (!text) return;
            const srt = `1\n00:00:00,000 --> 00:00:10,000\n${text}\n\n`;
            const blob = new Blob([srt], { type: 'text/srt' });
            downloadBlob(blob, 'transcript.srt', 'text/srt');
        });

        document.getElementById('stt-copy').addEventListener('click', () => {
            const text = getText();
            if (text) {
                navigator.clipboard.writeText(text);
                document.getElementById('stt-status').textContent = '✅ Copied!';
            }
        });
    </script>
</body>
</html>
