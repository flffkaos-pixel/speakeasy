<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeakEasy - Free TTS & STT</title>
    <meta name="description" content="Free Text-to-Speech and Speech-to-Text tool. Convert text to voice or voice to text in multiple languages.">
    
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1955893232253258" crossorigin="anonymous"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 25px; text-align: center; }
        .header h1 { font-size: 1.8rem; margin-bottom: 5px; }
        .header p { opacity: 0.9; font-size: 0.9rem; }
        
        .tabs { display: flex; border-bottom: 1px solid #eee; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-weight: 600; color: #666; }
        .tab.active { color: #667eea; border-bottom: 3px solid #667eea; }
        
        .content { padding: 25px; }
        .section { display: none; }
        .section.active { display: block; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        select, textarea { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 8px; font-size: 1rem; }
        textarea { min-height: 100px; resize: vertical; }
        
        .btn { display: inline-block; padding: 12px 30px; background: #667eea; color: white; border: none; border-radius: 50px; font-size: 1rem; font-weight: 600; cursor: pointer; margin: 5px 2px; }
        .btn-secondary { background: #764ba2; }
        
        .status { padding: 12px; background: #f5f5f5; border-radius: 8px; margin-top: 15px; text-align: center; color: #666; font-size: 0.9rem; }
        
        .ads-box { background: #f0f0f0; padding: 10px; text-align: center; margin: 15px 0; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>SpeakEasy</h1>
            <p>Free Text to Speech & Speech to Text</p>
        </div>
        
        <div class="tabs">
            <div class="tab active" onclick="showTab('tts')">TTS (Text to Speech)</div>
            <div class="tab" onclick="showTab('stt')">STT (Speech to Text)</div>
        </div>
        
        <div class="content">
            <!-- TTS Section -->
            <div class="section active" id="tts-section">
                <div class="form-group">
                    <label>Language / 언어</label>
                    <select id="tts-lang">
                        <option value="ko-KR">Korean / 한국어</option>
                        <option value="en-US">English</option>
                        <option value="ja-JP">Japanese /日本語</option>
                        <option value="zh-CN">Chinese / 中文</option>
                        <option value="es-ES">Spanish / Español</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Enter Text / 텍스트 입력</label>
                    <textarea id="tts-text" placeholder="Type here... / 여기에 입력..."></textarea>
                </div>
                
                <button class="btn" onclick="speak()">🔊 Speak</button>
                <button class="btn btn-secondary" onclick="stop()">⏹ Stop</button>
                
                <div class="status" id="tts-status">Ready</div>
                
                <!-- AdSense -->
                <div class="ads-box">
                    <ins class="adsbygoogle"
                         style="display:block"
                         data-ad-client="ca-pub-1955893232253258"
                         data-ad-slot="1234567890"
                         data-ad-format="auto"
                         data-full-width-responsive="true"></ins>
                </div>
            </div>
            
            <!-- STT Section -->
            <div class="section" id="stt-section">
                <div class="form-group">
                    <label>Language / 언어</label>
                    <select id="stt-lang">
                        <option value="ko-KR">Korean / 한국어</option>
                        <option value="en-US">English</option>
                        <option value="ja-JP">Japanese /日本語</option>
                        <option value="zh-CN">Chinese / 中文</option>
                    </select>
                </div>
                
                <button class="btn" onclick="startRecord()">🎤 Start Recording</button>
                <button class="btn btn-secondary" onclick="stopRecord()">⏹ Stop</button>
                
                <div class="form-group" style="margin-top: 15px;">
                    <label>Result / 결과</label>
                    <textarea id="stt-result" placeholder="Text will appear here... / 결과가 여기에 표시됩니다..."></textarea>
                </div>
                
                <button class="btn" onclick="copyResult()">📋 Copy</button>
                
                <div class="status" id="stt-status">Click Start to record</div>
                
                <!-- AdSense -->
                <div class="ads-box">
                    <ins class="adsbygoogle"
                         style="display:block"
                         data-ad-client="ca-pub-1955893232253258"
                         data-ad-slot="1234567890"
                         data-ad-format="auto"
                         data-full-width-responsive="true"></ins>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Tab switching
        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tab + '-section').classList.add('active');
        }
        
        // TTS
        const synth = window.speechSynthesis;
        
        function speak() {
            const text = document.getElementById('tts-text').value;
            if (!text) {
                document.getElementById('tts-status').textContent = 'Please enter text';
                return;
            }
            if (synth.speaking) synth.cancel();
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = document.getElementById('tts-lang').value;
            
            utterance.onstart = () => document.getElementById('tts-status').textContent = 'Speaking...';
            utterance.onend = () => document.getElementById('tts-status').textContent = 'Done!';
            
            synth.speak(utterance);
        }
        
        function stop() {
            synth.cancel();
            document.getElementById('tts-status').textContent = 'Stopped';
        }
        
        // STT
        let recognition = null;
        
        function startRecord() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                document.getElementById('stt-status').textContent = 'Not supported in this browser';
                return;
            }
            
            recognition = new SpeechRecognition();
            recognition.lang = document.getElementById('stt-lang').value;
            recognition.continuous = true;
            
            recognition.onresult = (event) => {
                let result = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    result += event.results[i][0].transcript;
                }
                document.getElementById('stt-result').value = result;
            };
            
            recognition.onstart = () => document.getElementById('stt-status').textContent = 'Recording...';
            recognition.onend = () => document.getElementById('stt-status').textContent = 'Stopped';
            
            recognition.start();
        }
        
        function stopRecord() {
            if (recognition) recognition.stop();
        }
        
        function copyResult() {
            const text = document.getElementById('stt-result').value;
            if (text) {
                navigator.clipboard.writeText(text);
                document.getElementById('stt-status').textContent = 'Copied!';
            }
        }
        
        // Load AdSense
        (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
</body>
</html>
